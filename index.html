<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f1117" />
<title>Punch Tracker</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --border: rgba(255,255,255,0.07);
    --text: #eef0f6;
    --muted: #6b7280;
    --green: #22d3a5;
    --green-dim: rgba(34,211,165,0.12);
    --orange: #f97316;
    --orange-dim: rgba(249,115,22,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.25rem;
  }
  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2.5s ease-in-out infinite;
  }
  .header-dot.inactive { background: var(--muted); box-shadow: none; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .header-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.75rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s;
  }
  .card.active { border-color: rgba(34,211,165,0.25); }
  .card.ready { border-color: rgba(249,115,22,0.4); }

  /* Corner accent */
  .card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top right, rgba(34,211,165,0.08), transparent 70%);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .card.ready::after { background: radial-gradient(circle at top right, rgba(249,115,22,0.12), transparent 70%); }

  .state-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .state-tag::before {
    content: '//';
    color: var(--green);
    font-size: 11px;
  }

  .big-time {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 500;
    letter-spacing: -2px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.35rem;
    transition: color 0.4s;
  }
  .big-time.green { color: var(--green); }
  .big-time.orange { color: var(--orange); }

  .sub-line {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.75rem;
    font-family: var(--mono);
  }
  .sub-line span { color: var(--text); }

  /* Progress bar */
  .prog-wrap {
    margin-bottom: 0.5rem;
  }
  .prog-bar {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .prog-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--green);
    width: 0%;
    transition: width 1s linear, background 0.4s;
    box-shadow: 0 0 8px var(--green);
  }
  .prog-fill.orange { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .prog-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .prog-meta .pct { color: var(--text); font-weight: 500; }

  /* Button */
  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.98); }
  .btn-in {
    background: var(--green);
    color: #0a1a14;
  }
  .btn-in:hover { background: #2de8b6; box-shadow: 0 0 24px rgba(34,211,165,0.35); }
  .btn-out {
    background: var(--orange);
    color: #1a0d00;
  }
  .btn-out:hover { background: #fb8c3d; box-shadow: 0 0 24px rgba(249,115,22,0.35); }
  .btn-locked {
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: not-allowed;
  }
  .btn-done {
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: not-allowed;
  }

  /* ALERT OVERLAY - visual cue */
  #alert-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(249,115,22,0.08);
    animation: flashbg 1.2s ease-in-out infinite;
    pointer-events: none;
  }
  #alert-overlay.show { display: block; }
  @keyframes flashbg {
    0%,100% { background: rgba(249,115,22,0.05); }
    50% { background: rgba(249,115,22,0.18); }
  }

  .alert-banner {
    display: none;
    background: var(--orange);
    color: #1a0d00;
    border-radius: 14px;
    padding: 1rem 1.25rem;
    text-align: center;
    animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .alert-banner.show { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .alert-banner .alert-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .alert-banner .alert-sub {
    font-size: 12px;
    opacity: 0.7;
    font-family: var(--mono);
  }

  /* Summary row */
  .summary {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .summary.show { display: grid; }
  .summary-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
  }
  .summary-cell .s-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 4px;
  }
  .summary-cell .s-val {
    font-size: 20px;
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text);
  }

  /* Reset */
  .reset-link {
    text-align: center;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    cursor: pointer;
    padding: 0.5rem;
    display: none;
  }
  .reset-link.show { display: block; }
  .reset-link:hover { color: var(--text); }
</style>
</head>
<body>

<div id="alert-overlay"></div>

<div class="container">
  <div class="header">
    <div class="header-dot inactive" id="header-dot"></div>
    <div class="header-title">Punch Tracker</div>
  </div>

  <div class="alert-banner" id="alert-banner">
    <div class="alert-title">8 hours done — punch out now!</div>
    <div class="alert-sub" id="alert-sub-text">open PeopleStrong and log out</div>
  </div>

  <div class="card" id="main-card">
    <div class="state-tag" id="state-tag">waiting for punch in</div>
    <div class="big-time" id="big-time">--:--</div>
    <div class="sub-line" id="sub-line">tap below to begin</div>
    <div class="prog-wrap" id="prog-wrap" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-meta">
        <span id="countdown-label">time remaining</span>
        <span class="pct" id="pct-label">0%</span>
      </div>
    </div>
  </div>

  <button class="btn btn-in" id="main-btn" onclick="handleBtn()">Punch in</button>

  <div class="summary" id="summary">
    <div class="summary-cell">
      <div class="s-label">punched in</div>
      <div class="s-val" id="s-in">--:--</div>
    </div>
    <div class="summary-cell">
      <div class="s-label">punched out</div>
      <div class="s-val" id="s-out">--:--</div>
    </div>
    <div class="summary-cell" style="grid-column:1/-1">
      <div class="s-label">total logged</div>
      <div class="s-val" id="s-hrs">-- hrs</div>
    </div>
  </div>

  <div class="reset-link" id="reset-link" onclick="resetDay()">↺ reset for tomorrow</div>
  <div onclick="demoAlert()" style="text-align:center;font-size:11px;font-family:'DM Mono',monospace;color:#6b7280;cursor:pointer;padding:0.4rem;opacity:0.5" id="demo-link">preview alert state</div>
</div>

<script>
const WORK_MS = 8 * 60 * 60 * 1000;
const S = { IDLE:'idle', IN:'in', DONE:'done', OUT:'out' };
let state = S.IDLE, punchIn = null, punchOut = null, ticker = null, alarmFired = false;

function fmt12(d) {
  return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}
function fmtCountdown(ms) {
  if (ms <= 0) return '0:00:00';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function handleBtn() {
  if (state === S.IDLE) { punchIn = new Date(); state = S.IN; startTicker(); }
  else if (state === S.DONE) { punchOut = new Date(); state = S.OUT; clearInterval(ticker); }
  // state === S.IN: button is locked, do nothing
  render();
}

function demoAlert() {
  punchIn = new Date(Date.now() - WORK_MS);
  state = S.DONE;
  alarmFired = true;
  clearInterval(ticker);
  // Start ticker so progress bar shows 100% and countdown stays at 0
  ticker = setInterval(() => {
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('prog-fill').classList.add('orange');
    document.getElementById('pct-label').textContent = '100%';
    document.getElementById('countdown-label').textContent = '0:00:00';
  }, 1000);
  fireAlert();
  render();
}

function startTicker() {
  clearInterval(ticker);
  ticker = setInterval(() => {
    const elapsed = Date.now() - punchIn;
    const remaining = WORK_MS - elapsed;
    const pct = Math.min(100, Math.round((elapsed / WORK_MS) * 100));
    const fill = document.getElementById('prog-fill');
    fill.style.width = pct + '%';
    if (pct >= 80) fill.classList.add('orange'); else fill.classList.remove('orange');
    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('countdown-label').textContent = remaining > 0 ? fmtCountdown(remaining) : '0:00:00';
    if (remaining <= 0 && !alarmFired) { alarmFired = true; state = S.DONE; fireAlert(); render(); }
  }, 1000);
}

function fireAlert() {
  document.getElementById('alert-overlay').classList.add('show');
  document.getElementById('alert-banner').classList.add('show');
  document.getElementById('alert-sub-text').textContent = `punched in at ${fmt12(punchIn)}`;

  if ('Notification' in window) {
    Notification.requestPermission().then(p => {
      if (p === 'granted') new Notification('8 hrs done — punch out!', {
        body: `You punched in at ${fmt12(punchIn)}. Open PeopleStrong now.`,
        requireInteraction: true
      });
    });
  }

  // Wake lock to keep screen on (if supported)
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
}

function render() {
  const dot = document.getElementById('header-dot');
  const card = document.getElementById('main-card');
  const tag = document.getElementById('state-tag');
  const bt = document.getElementById('big-time');
  const sub = document.getElementById('sub-line');
  const btn = document.getElementById('main-btn');
  const pw = document.getElementById('prog-wrap');
  const sum = document.getElementById('summary');
  const rl = document.getElementById('reset-link');
  const overlay = document.getElementById('alert-overlay');
  const banner = document.getElementById('alert-banner');

  if (state === S.IDLE) {
    dot.className = 'header-dot inactive';
    card.className = 'card';
    tag.textContent = 'waiting for punch in';
    bt.textContent = '--:--'; bt.className = 'big-time';
    sub.innerHTML = 'tap below to begin';
    btn.className = 'btn btn-in'; btn.textContent = 'Punch in';
    pw.style.display = 'none';
    sum.classList.remove('show');
    rl.classList.remove('show');
    overlay.classList.remove('show');
    banner.classList.remove('show');
  }

  if (state === S.IN) {
    dot.className = 'header-dot';
    card.className = 'card active';
    tag.textContent = 'session active';
    bt.textContent = fmt12(punchIn); bt.className = 'big-time green';
    const target = new Date(punchIn.getTime() + WORK_MS);
    sub.innerHTML = `punch out after <span>${fmt12(target)}</span>`;
    btn.className = 'btn btn-locked'; btn.textContent = 'Punch out (not yet)';
    pw.style.display = 'block';
    sum.classList.remove('show');
    rl.classList.remove('show');
  }

  if (state === S.DONE) {
    card.className = 'card ready';
    tag.textContent = '8 hrs complete';
    bt.textContent = fmt12(punchIn); bt.className = 'big-time orange';
    sub.innerHTML = `safe to punch out now`;
    btn.className = 'btn btn-out'; btn.textContent = 'Punch out';
    pw.style.display = 'block';
  }

  if (state === S.OUT) {
    dot.className = 'header-dot inactive';
    card.className = 'card';
    tag.textContent = 'day complete';
    const ms = punchOut - punchIn;
    const hrs = (ms / 3600000).toFixed(1);
    bt.textContent = fmt12(punchOut); bt.className = 'big-time';
    sub.innerHTML = `${hrs} hrs logged today`;
    btn.className = 'btn btn-done'; btn.textContent = 'See you tomorrow';
    pw.style.display = 'none';
    overlay.classList.remove('show');
    banner.classList.remove('show');

    document.getElementById('s-in').textContent = fmt12(punchIn);
    document.getElementById('s-out').textContent = fmt12(punchOut);
    document.getElementById('s-hrs').textContent = hrs + ' hrs';
    sum.classList.add('show');
    rl.classList.add('show');
  }
}

function resetDay() {
  state = S.IDLE; punchIn = null; punchOut = null; alarmFired = false;
  clearInterval(ticker);
  render();
}

render();
</script>
</body>
</html>
